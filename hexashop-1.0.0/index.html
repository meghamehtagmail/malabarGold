  <script>
    const discoveryData = {
  page: window.location.href,
  atjsVersion: adobe.target.VERSION,
  globalSettings: window.targetGlobalSettings,
  mboxes: [],
  networkCalls: []
};

// Capture all mboxes on page
document.querySelectorAll('[class*="mbox"]').forEach(el => {
  discoveryData.mboxes.push({
    name: el.className,
    element: el.tagName,
    id: el.id
  });
});

// Monitor network calls
const originalFetch = window.fetch;
window.fetch = function(...args) {
  if (args[0].includes('tt.omtrdc.net')) {
    discoveryData.networkCalls.push({
      url: args[0],
      timestamp: new Date().toISOString()
    });
  }
  return originalFetch.apply(this, args);
};
  </script>

  <script>
  window.adobeDataLayer = window.adobeDataLayer || [];

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", function () {
      const productName = this.getAttribute("data-product-name");

      adobeDataLayer.push({
        event: "click track",
        page: {
          name: "product"
        },
        interaction: {
          name: productName
        }
      });

      console.log("DataLayer fired for:", productName);
    });
  });

    if(localStorage.getItem('loggedIn')=="true")
    {
      var a =localStorage.getItem('user').split(',')[0].split(':')[1]
    var emailID = JSON.parse(a)
    
      adobeDataLayer.push({
        event: "user track",
        loggedInDetails: {
          loggedIn: "true",
          emailId : emailID
          
        }
      });
    }
</script>
